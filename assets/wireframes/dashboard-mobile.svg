<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 700" font-family="'Comic Sans MS','Segoe Print',cursive" fill="#333">
  <rect width="360" height="700" fill="#fff" stroke="#999" stroke-width="2" rx="4"/>

  <text x="180" y="25" text-anchor="middle" font-size="12" fill="#888">Dashboard — Mobile View</text>

  <!-- Header -->
  <rect x="15" y="40" width="330" height="36" rx="4" fill="none" stroke="#333" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="30" y="63" font-size="13" font-weight="bold">StudentWallet</text>
  <!-- Hamburger -->
  <line x1="310" y1="52" x2="330" y2="52" stroke="#333" stroke-width="2"/>
  <line x1="310" y1="58" x2="330" y2="58" stroke="#333" stroke-width="2"/>
  <line x1="310" y1="64" x2="330" y2="64" stroke="#333" stroke-width="2"/>

  <text x="25" y="105" font-size="16" font-weight="bold">Dashboard</text>

  <!-- Stat Cards Stacked -->
  <rect x="15" y="120" width="330" height="65" rx="4" fill="#f9f9f9" stroke="#333" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="30" y="142" font-size="9" fill="#888">TOTAL RECORDS</text>
  <text x="30" y="170" font-size="20" font-weight="bold" fill="#e6a000">12</text>

  <rect x="15" y="195" width="330" height="65" rx="4" fill="#f9f9f9" stroke="#333" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="30" y="217" font-size="9" fill="#888">TOTAL SPENT</text>
  <text x="30" y="245" font-size="20" font-weight="bold" fill="#e6a000">$1,971.24</text>

  <rect x="15" y="270" width="330" height="65" rx="4" fill="#f9f9f9" stroke="#333" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="30" y="292" font-size="9" fill="#888">TOP CATEGORY</text>
  <text x="30" y="320" font-size="20" font-weight="bold" fill="#e6a000">Fees</text>

  <rect x="15" y="345" width="330" height="65" rx="4" fill="#f9f9f9" stroke="#333" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="30" y="367" font-size="9" fill="#888">BUDGET</text>
  <text x="30" y="395" font-size="20" font-weight="bold" fill="#4caf50">$3,028</text>
  <text x="200" y="395" font-size="11" fill="#4caf50">Remaining</text>

  <!-- Chart -->
  <rect x="15" y="425" width="330" height="200" rx="4" fill="#f9f9f9" stroke="#333" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="30" y="450" font-size="13" font-weight="bold">Last 7 Days</text>

  <rect x="40" y="560" width="30" height="10" fill="#e6a000" rx="2"/>
  <rect x="85" y="530" width="30" height="40" fill="#e6a000" rx="2"/>
  <rect x="130" y="545" width="30" height="25" fill="#e6a000" rx="2"/>
  <rect x="175" y="520" width="30" height="50" fill="#e6a000" rx="2"/>
  <rect x="220" y="540" width="30" height="30" fill="#e6a000" rx="2"/>
  <rect x="265" y="555" width="30" height="15" fill="#e6a000" rx="2"/>
  <rect x="310" y="560" width="30" height="10" fill="#e6a000" rx="2"/>

  <text x="55" y="585" font-size="8" fill="#888" text-anchor="middle">13</text>
  <text x="100" y="585" font-size="8" fill="#888" text-anchor="middle">14</text>
  <text x="145" y="585" font-size="8" fill="#888" text-anchor="middle">15</text>
  <text x="190" y="585" font-size="8" fill="#888" text-anchor="middle">16</text>
  <text x="235" y="585" font-size="8" fill="#888" text-anchor="middle">17</text>
  <text x="280" y="585" font-size="8" fill="#888" text-anchor="middle">18</text>
  <text x="325" y="585" font-size="8" fill="#888" text-anchor="middle">19</text>

  <!-- Footer -->
  <line x1="15" y1="660" x2="345" y2="660" stroke="#ddd" stroke-width="1"/>
  <text x="180" y="680" text-anchor="middle" font-size="9" fill="#aaa">© 2026 Student Finance Tracker</text>
</svg>
