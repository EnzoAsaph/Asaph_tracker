<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="'Comic Sans MS','Segoe Print',cursive" fill="#333">
  <rect width="800" height="600" fill="#fff" stroke="#999" stroke-width="2" rx="4"/>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" font-size="14" fill="#888">Dashboard — Desktop View</text>

  <!-- Header -->
  <rect x="20" y="45" width="760" height="40" rx="4" fill="none" stroke="#333" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="40" y="70" font-size="14" font-weight="bold">StudentWallet</text>
  <text x="350" y="70" font-size="11" fill="#666">Dashboard   Records   Add New   Settings   About</text>

  <!-- Page Title -->
  <text x="40" y="115" font-size="18" font-weight="bold">Dashboard</text>
  <line x1="40" y1="120" x2="200" y2="120" stroke="#ccc" stroke-width="1"/>

  <!-- Stat Cards Row -->
  <rect x="40" y="140" width="230" height="90" rx="4" fill="#f9f9f9" stroke="#333" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="55" y="165" font-size="10" fill="#888">TOTAL RECORDS</text>
  <text x="55" y="195" font-size="24" font-weight="bold" fill="#e6a000">12</text>

  <rect x="285" y="140" width="230" height="90" rx="4" fill="#f9f9f9" stroke="#333" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="300" y="165" font-size="10" fill="#888">TOTAL SPENT</text>
  <text x="300" y="195" font-size="24" font-weight="bold" fill="#e6a000">$1,971.24</text>

  <rect x="530" y="140" width="230" height="90" rx="4" fill="#f9f9f9" stroke="#333" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="545" y="165" font-size="10" fill="#888">TOP CATEGORY</text>
  <text x="545" y="195" font-size="24" font-weight="bold" fill="#e6a000">Fees</text>

  <!-- Budget Card -->
  <rect x="40" y="245" width="230" height="90" rx="4" fill="#f9f9f9" stroke="#333" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="55" y="270" font-size="10" fill="#888">BUDGET</text>
  <text x="55" y="300" font-size="24" font-weight="bold" fill="#e74c3c">$1,471</text>
  <text x="55" y="320" font-size="11" fill="#e74c3c">Over budget!</text>

  <!-- Chart -->
  <rect x="40" y="350" width="720" height="210" rx="4" fill="#f9f9f9" stroke="#333" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="60" y="380" font-size="14" font-weight="bold">Last 7 Days</text>

  <!-- Bar chart bars -->
  <rect x="100" y="470" width="60" height="10" fill="#e6a000" rx="2"/>
  <rect x="200" y="430" width="60" height="50" fill="#e6a000" rx="2"/>
  <rect x="300" y="450" width="60" height="30" fill="#e6a000" rx="2"/>
  <rect x="400" y="410" width="60" height="70" fill="#e6a000" rx="2"/>
  <rect x="500" y="440" width="60" height="40" fill="#e6a000" rx="2"/>
  <rect x="600" y="460" width="60" height="20" fill="#e6a000" rx="2"/>
  <rect x="700" y="470" width="60" height="10" fill="#e6a000" rx="2"/>

  <text x="115" y="500" font-size="9" fill="#888" text-anchor="middle">Jun13</text>
  <text x="215" y="500" font-size="9" fill="#888" text-anchor="middle">Jun14</text>
  <text x="315" y="500" font-size="9" fill="#888" text-anchor="middle">Jun15</text>
  <text x="415" y="500" font-size="9" fill="#888" text-anchor="middle">Jun16</text>
  <text x="515" y="500" font-size="9" fill="#888" text-anchor="middle">Jun17</text>
  <text x="615" y="500" font-size="9" fill="#888" text-anchor="middle">Jun18</text>
  <text x="715" y="500" font-size="9" fill="#888" text-anchor="middle">Jun19</text>

  <!-- Footer -->
  <line x1="20" y1="570" x2="780" y2="570" stroke="#ddd" stroke-width="1"/>
  <text x="400" y="590" text-anchor="middle" font-size="10" fill="#aaa">© 2026 Student Finance Tracker</text>
</svg>
