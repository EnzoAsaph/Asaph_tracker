<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="'Comic Sans MS','Segoe Print',cursive" fill="#333">
  <rect width="800" height="400" fill="#fff" stroke="#999" stroke-width="2" rx="4"/>
  <text x="400" y="30" text-anchor="middle" font-size="14" fill="#888">About — Desktop View</text>

  <!-- Header -->
  <rect x="20" y="45" width="760" height="40" rx="4" fill="none" stroke="#333" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="40" y="70" font-size="14" font-weight="bold">StudentWallet</text>
  <text x="350" y="70" font-size="11" fill="#666">Dashboard   Records   Add New   Settings   About</text>

  <text x="40" y="115" font-size="18" font-weight="bold">About</text>

  <!-- About Card -->
  <rect x="40" y="130" width="480" height="230" rx="4" fill="#f9f9f9" stroke="#333" stroke-width="1.5" stroke-dasharray="5,3"/>

  <text x="60" y="158" font-size="14" font-weight="bold">Student Finance Tracker</text>
  <text x="60" y="178" font-size="10" fill="#888">A privacy-focused, accessible web app for</text>
  <text x="60" y="193" font-size="10" fill="#888">managing student finances. Built with vanilla</text>
  <text x="60" y="208" font-size="10" fill="#888">HTML, CSS, and JavaScript.</text>

  <text x="60" y="238" font-size="12" font-weight="bold">Key Features</text>
  <text x="60" y="258" font-size="10" fill="#888">• Dashboard with stats and 7-day chart</text>
  <text x="60" y="273" font-size="10" fill="#888">• Regex-powered search and validation</text>
  <text x="60" y="288" font-size="10" fill="#888">• Import/export JSON, localStorage</text>
  <text x="60" y="303" font-size="10" fill="#888">• Dark/light theme, multi-currency</text>

  <text x="60" y="330" font-size="12" font-weight="bold">Developer Contact</text>
  <text x="60" y="348" font-size="10" fill="#888">GitHub: @EnzoAsaph</text>
  <text x="60" y="363" font-size="10" fill="#888">Email: enzoasaph5@gmail.com</text>

  <!-- Footer -->
  <line x1="20" y1="380" x2="780" y2="380" stroke="#ddd" stroke-width="1"/>
  <text x="400" y="395" text-anchor="middle" font-size="10" fill="#aaa">© 2026 Student Finance Tracker</text>
</svg>
